<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UW Voice Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    h1 { margin: 2rem 0 0.5rem; font-size: 1.5rem; color: #b388ff; }
    #chat { flex: 1; width: 100%; max-width: 600px; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { padding: 0.75rem 1rem; border-radius: 1rem; max-width: 85%; line-height: 1.4; font-size: 0.95rem; }
    .user { background: #1e3a5f; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
    .agent { background: #2a2a2a; align-self: flex-start; border-bottom-left-radius: 0.25rem; }
    .interim { background: #1a1a2e; align-self: flex-end; border-bottom-right-radius: 0.25rem; opacity: 0.6; font-style: italic; }
    #controls { padding: 1.5rem; display: flex; gap: 1rem; align-items: center; }
    button { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; font-size: 1.8rem; transition: all 0.2s; }
    #micBtn { background: #b388ff; color: #0f0f0f; }
    #micBtn:hover { background: #ce93d8; }
    #micBtn.active { background: #4caf50; animation: pulse 2s infinite; }
    #status { font-size: 0.85rem; color: #888; min-height: 1.2em; margin-bottom: 1rem; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(76,175,80,0.4); } 50% { box-shadow: 0 0 0 15px rgba(76,175,80,0); } }
  </style>
</head>
<body>
  <h1>🎙️ UW Voice Agent</h1>
  <div id="chat"></div>
  <div id="controls">
    <button id="micBtn" onclick="toggleMic()">🎤</button>
  </div>
  <div id="status">Click mic to start conversation</div>

  <script>
    let ws, audioCtx, workletNode, stream, micActive = false, agentSpeaking = false;
    let audioQueue = [], playing = false, interimDiv = null, currentSource = null;
    const chat = document.getElementById('chat');
    const btn = document.getElementById('micBtn');
    const status = document.getElementById('status');

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/chat`);
      ws.binaryType = 'arraybuffer';
      ws.onmessage = handleMessage;
      ws.onclose = () => setTimeout(connect, 1000);
      ws.onopen = () => { status.textContent = 'Connected — click mic to start'; };
    }

    function handleMessage(e) {
      if (e.data instanceof ArrayBuffer) {
        audioQueue.push(e.data);
        if (!playing) playNextChunk();
      } else {
        const msg = JSON.parse(e.data);
        if (msg.type === 'transcript') {
          if (msg.is_final) {
            removeInterim();
            addMsg(msg.text, 'user');
          } else {
            showInterim(msg.text);
          }
        } else if (msg.type === 'response_text') {
          addMsg(msg.text, 'agent');
        } else if (msg.type === 'response_start') {
          agentSpeaking = true;
          status.textContent = '🔊 Agent speaking... (talk to interrupt)';
        } else if (msg.type === 'response_end') {
          agentSpeaking = false;
          if (micActive) status.textContent = '🎤 Listening...';
        } else if (msg.type === 'error') {
          addMsg('Error: ' + msg.message, 'agent');
        }
      }
    }

    async function playNextChunk() {
      if (audioQueue.length === 0) { playing = false; return; }
      playing = true;
      const buf = audioQueue.shift();
      try {
        const actx = new AudioContext();
        const decoded = await actx.decodeAudioData(buf);
        currentSource = actx.createBufferSource();
        currentSource.buffer = decoded;
        currentSource.connect(actx.destination);
        currentSource.onended = () => { actx.close(); currentSource = null; playNextChunk(); };
        currentSource.start();
      } catch (err) {
        console.error('Audio error:', err);
        playNextChunk();
      }
    }

    function stopPlayback() {
      audioQueue = [];
      if (currentSource) { try { currentSource.stop(); } catch(e) {} currentSource = null; }
      playing = false;
    }

    async function toggleMic() {
      if (micActive) {
        // Turn off mic
        micActive = false;
        btn.classList.remove('active');
        btn.textContent = '🎤';
        if (workletNode) { workletNode.disconnect(); workletNode = null; }
        if (audioCtx) { audioCtx.close(); audioCtx = null; }
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        status.textContent = 'Mic off — click to start';
        return;
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        });
        audioCtx = new AudioContext({ sampleRate: 16000 });
        const source = audioCtx.createMediaStreamSource(stream);

        const workletCode = `
          class P extends AudioWorkletProcessor {
            process(inputs) {
              const ch = inputs[0][0];
              if (ch) this.port.postMessage(ch);
              return true;
            }
          }
          registerProcessor('p', P);
        `;
        const blob = new Blob([workletCode], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        await audioCtx.audioWorklet.addModule(url);
        URL.revokeObjectURL(url);

        workletNode = new AudioWorkletNode(audioCtx, 'p');
        workletNode.port.onmessage = (e) => {
          if (!micActive || ws?.readyState !== 1) return;
          const f32 = e.data;
          const i16 = new Int16Array(f32.length);
          for (let i = 0; i < f32.length; i++)
            i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
          ws.send(i16.buffer);
        };
        source.connect(workletNode);
        workletNode.connect(audioCtx.destination);

        micActive = true;
        btn.classList.add('active');
        btn.textContent = '🟢';
        status.textContent = '🎤 Listening...';
      } catch (err) {
        status.textContent = 'Mic error: ' + err.message;
      }
    }

    function addMsg(text, role) {
      removeInterim();
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function showInterim(text) {
      if (!interimDiv) {
        interimDiv = document.createElement('div');
        interimDiv.className = 'msg interim';
        chat.appendChild(interimDiv);
      }
      interimDiv.textContent = text;
      chat.scrollTop = chat.scrollHeight;
    }

    function removeInterim() {
      if (interimDiv) { interimDiv.remove(); interimDiv = null; }
    }

    connect();
  </script>
</body>
</html>
