<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UW Voice Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; min-height: 100vh; }

    /* ─── Sidebar ─── */
    #sidebar {
      width: 240px; min-width: 240px; background: #1a1a1a; border-right: 1px solid #2a2a2a;
      display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0;
    }
    #sidebar-header {
      padding: 1rem; border-bottom: 1px solid #2a2a2a; display: flex; align-items: center; gap: 0.5rem;
    }
    #sidebar-header h2 { font-size: 0.95rem; color: #b388ff; flex: 1; }
    #newChatBtn {
      background: #b388ff; color: #0f0f0f; border: none; border-radius: 6px;
      padding: 0.4rem 0.7rem; font-size: 0.8rem; cursor: pointer; font-weight: 600;
    }
    #newChatBtn:hover { background: #ce93d8; }
    #session-list {
      flex: 1; overflow-y: auto; padding: 0.5rem;
      display: flex; flex-direction: column; gap: 2px;
    }
    .session-item {
      padding: 0.6rem 0.75rem; border-radius: 8px; cursor: pointer;
      font-size: 0.82rem; color: #bbb; transition: background 0.15s;
      display: flex; align-items: center; justify-content: space-between;
      white-space: nowrap; overflow: hidden;
    }
    .session-item:hover { background: #2a2a2a; }
    .session-item.active { background: #2d2045; color: #e0e0e0; }
    .session-title { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .session-delete {
      opacity: 0; color: #888; cursor: pointer; font-size: 0.75rem; margin-left: 0.5rem;
      padding: 2px 5px; border-radius: 4px;
    }
    .session-item:hover .session-delete { opacity: 1; }
    .session-delete:hover { color: #ff6b6b; background: #333; }
    .session-time {
      font-size: 0.7rem; color: #666; margin-top: 2px;
    }

    /* ─── Main content ─── */
    #main {
      flex: 1; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }
    h1 { margin: 2rem 0 0.5rem; font-size: 1.5rem; color: #b388ff; }
    #chat {
      flex: 1; width: 100%; max-width: 600px; overflow-y: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .msg { padding: 0.75rem 1rem; border-radius: 1rem; max-width: 85%; line-height: 1.4; font-size: 0.95rem; }
    .user { background: #1e3a5f; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
    .agent { background: #2a2a2a; align-self: flex-start; border-bottom-left-radius: 0.25rem; }
    .interim { background: #1a1a2e; align-self: flex-end; border-bottom-right-radius: 0.25rem; opacity: 0.6; font-style: italic; }
    #controls { padding: 1.5rem; display: flex; gap: 1rem; align-items: center; }
    .mic-group { display: flex; gap: 0.6rem; align-items: center; }
    button.mic-btn {
      width: 72px; height: 72px; border-radius: 50%; border: 3px solid transparent;
      cursor: pointer; font-size: 1.6rem; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative;
    }
    .mic-label {
      font-size: 0.5rem; font-weight: 600; letter-spacing: 0.03em;
      margin-top: 2px; text-transform: uppercase;
    }
    #micBtn { background: #b388ff; color: #0f0f0f; }
    #micBtn:hover { background: #ce93d8; }
    #micBtn.active { background: #4caf50; animation: pulse 2s infinite; border-color: #66bb6a; }
    #micBtn:disabled { background: #555; cursor: not-allowed; animation: none; border-color: transparent; }
    #pttBtn { background: #ff9800; color: #0f0f0f; }
    #pttBtn:hover { background: #ffb74d; }
    #pttBtn.recording { background: #f44336; color: #fff; animation: pttPulse 1s infinite; border-color: #ef5350; }
    #pttBtn:disabled { background: #555; cursor: not-allowed; animation: none; border-color: transparent; }
    #stopBtn {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: #444; color: #e0e0e0; font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    }
    #stopBtn:hover { background: #ff6b6b; color: #fff; }
    #stopBtn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
    #submitBtn {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: #444; color: #e0e0e0; font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    }
    #submitBtn:hover { background: #4caf50; color: #fff; }
    #submitBtn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }
    #submitBtn.submitted { background: #2e7d32; color: #fff; }
    @keyframes pttPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(244,67,54,0.5); } 50% { box-shadow: 0 0 0 12px rgba(244,67,54,0); } }
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: #333; color: #e0e0e0; padding: 0.75rem 1.5rem; border-radius: 8px;
      font-size: 0.85rem; z-index: 100; opacity: 0; transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    .toast.success { border-left: 3px solid #4caf50; }
    .toast.error { border-left: 3px solid #ff6b6b; }
    #status { font-size: 0.85rem; color: #888; min-height: 1.2em; margin-bottom: 1rem; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(76,175,80,0.4); } 50% { box-shadow: 0 0 0 15px rgba(76,175,80,0); } }

    .history-label {
      text-align: center; color: #666; font-size: 0.85rem; padding: 2rem 1rem;
    }

    /* ─── Responsive ─── */
    @media (max-width: 700px) {
      #sidebar { width: 60px; min-width: 60px; }
      #sidebar-header h2, .session-title, .session-delete, .session-time { display: none; }
      #newChatBtn { padding: 0.4rem; font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>History</h2>
      <button id="newChatBtn" onclick="startNewChat()">+ New</button>
    </div>
    <div id="session-list"></div>
  </div>

  <!-- Main content -->
  <div id="main">
    <h1>🎙️ UW Voice Agent</h1>
    <div id="chat"></div>
    <div id="controls">
      <div class="mic-group">
        <button id="micBtn" class="mic-btn" onclick="toggleMic()" title="Streaming: always-on mic with auto-send">
          🎤<span class="mic-label">Stream</span>
        </button>
        <button id="pttBtn" class="mic-btn" onclick="togglePTT()" title="Push-to-Talk: press to record, press again to send">
          🎙️<span class="mic-label">PTT</span>
        </button>
      </div>
      <button id="stopBtn" onclick="stopOutput()" disabled title="Stop audio output">⏹</button>
      <button id="submitBtn" onclick="submitSession()" title="Submit conversation to analytics">📤</button>
    </div>
    <div id="status">Click mic to start conversation</div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    let ws, audioCtx, workletNode, stream, micActive = false, agentSpeaking = false;
    let pttRecording = false;  // true when PTT is actively recording
    let audioQueue = [], playing = false, interimDiv = null, currentSource = null;
    let currentSessionId = null;
    let viewingHistory = false;  // true when viewing a past session (read-only)
    const chat = document.getElementById('chat');
    const btn = document.getElementById('micBtn');
    const pttBtn = document.getElementById('pttBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const sessionList = document.getElementById('session-list');

    // ─── WebSocket connection ───
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/chat`);
      ws.binaryType = 'arraybuffer';
      ws.onmessage = handleMessage;
      ws.onclose = () => {
        if (!viewingHistory) setTimeout(connect, 1000);
      };
      ws.onopen = () => {
        status.textContent = 'Connected — choose Stream or PTT';
        viewingHistory = false;
        btn.disabled = false;
        pttBtn.disabled = false;
      };
    }

    function handleMessage(e) {
      if (e.data instanceof ArrayBuffer) {
        audioQueue.push(e.data);
        if (!playing) playNextChunk();
      } else {
        const msg = JSON.parse(e.data);
        if (msg.type === 'session_id') {
          currentSessionId = msg.session_id;
          highlightSession(currentSessionId);
          // Refresh sidebar after a delay to pick up the new session
          setTimeout(loadSessions, 500);
        } else if (msg.type === 'transcript') {
          if (msg.is_final) {
            removeInterim();
            addMsg(msg.text, 'user');
          } else {
            showInterim(msg.text);
          }
        } else if (msg.type === 'response_text') {
          addMsg(msg.text, 'agent');
          // Refresh sidebar to pick up title update
          setTimeout(loadSessions, 2000);
        } else if (msg.type === 'response_start') {
          agentSpeaking = true;
          stopBtn.disabled = false;
          status.textContent = '🔊 Agent speaking... (talk to interrupt)';
        } else if (msg.type === 'response_end') {
          agentSpeaking = false;
          stopBtn.disabled = true;
          if (micActive) status.textContent = '🎤 Streaming — auto-sends on pause';
          else if (!pttRecording) status.textContent = 'Connected — choose Stream or PTT';
        } else if (msg.type === 'error') {
          addMsg('Error: ' + msg.message, 'agent');
        }
      }
    }

    // ─── Audio playback ───
    async function playNextChunk() {
      if (audioQueue.length === 0) { playing = false; return; }
      playing = true;
      const buf = audioQueue.shift();
      try {
        const actx = new AudioContext();
        const decoded = await actx.decodeAudioData(buf);
        currentSource = actx.createBufferSource();
        currentSource.buffer = decoded;
        currentSource.connect(actx.destination);
        currentSource.onended = () => { actx.close(); currentSource = null; playNextChunk(); };
        currentSource.start();
      } catch (err) {
        console.error('Audio error:', err);
        playNextChunk();
      }
    }

    function stopPlayback() {
      audioQueue = [];
      if (currentSource) { try { currentSource.stop(); } catch(e) {} currentSource = null; }
      playing = false;
    }

    function stopOutput() {
      // Stop audio playback and tell server to stop sending more TTS chunks
      stopPlayback();
      if (ws?.readyState === 1) {
        ws.send(JSON.stringify({ type: 'interrupt' }));
      }
      stopBtn.disabled = true;
      agentSpeaking = false;
      if (micActive) status.textContent = '🎤 Listening...';
    }

    // ─── Shared mic helpers ───
    async function startAudioCapture(checkFlag) {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });
      audioCtx = new AudioContext({ sampleRate: 16000 });
      const source = audioCtx.createMediaStreamSource(stream);

      const workletCode = `
        class P extends AudioWorkletProcessor {
          process(inputs) {
            const ch = inputs[0][0];
            if (ch) this.port.postMessage(ch);
            return true;
          }
        }
        registerProcessor('p', P);
      `;
      const blob = new Blob([workletCode], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      await audioCtx.audioWorklet.addModule(url);
      URL.revokeObjectURL(url);

      workletNode = new AudioWorkletNode(audioCtx, 'p');
      workletNode.port.onmessage = (e) => {
        if (!checkFlag() || ws?.readyState !== 1) return;
        const f32 = e.data;
        const i16 = new Int16Array(f32.length);
        for (let i = 0; i < f32.length; i++)
          i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
        ws.send(i16.buffer);
      };
      source.connect(workletNode);
      workletNode.connect(audioCtx.destination);
    }

    function stopAudioCapture() {
      if (workletNode) { workletNode.disconnect(); workletNode = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    }

    // ─── Streaming mic toggle ───
    async function toggleMic() {
      if (viewingHistory || pttRecording) return;
      if (micActive) {
        micActive = false;
        btn.classList.remove('active');
        btn.innerHTML = '🎤<span class="mic-label">Stream</span>';
        stopAudioCapture();
        pttBtn.disabled = false;  // Re-enable PTT
        status.textContent = 'Connected — choose Stream or PTT';
        return;
      }

      try {
        pttBtn.disabled = true;  // Disable PTT while streaming
        await startAudioCapture(() => micActive);
        micActive = true;
        btn.classList.add('active');
        btn.innerHTML = '🟢<span class="mic-label">Stream</span>';
        status.textContent = '🎤 Streaming — auto-sends on pause';
      } catch (err) {
        pttBtn.disabled = false;
        status.textContent = 'Mic error: ' + err.message;
      }
    }

    // ─── Push-to-Talk toggle ───
    async function togglePTT() {
      if (viewingHistory || micActive) return;

      if (pttRecording) {
        // ── Stop recording & send ──
        pttRecording = false;
        pttBtn.classList.remove('recording');
        pttBtn.innerHTML = '🎙️<span class="mic-label">PTT</span>';
        btn.disabled = false;  // Re-enable streaming

        // Tell server to process immediately (no debounce)
        if (ws?.readyState === 1) {
          ws.send(JSON.stringify({ type: 'ptt_stop' }));
        }

        // Stop local mic
        stopAudioCapture();
        status.textContent = '⏳ Processing...';
        return;
      }

      // ── Start recording ──
      try {
        btn.disabled = true;  // Disable streaming while PTT active
        await startAudioCapture(() => pttRecording);
        pttRecording = true;
        pttBtn.classList.add('recording');
        pttBtn.innerHTML = '⏺️<span class="mic-label">Send</span>';
        status.textContent = '🔴 Recording — click PTT again to send';
      } catch (err) {
        btn.disabled = false;
        status.textContent = 'Mic error: ' + err.message;
      }
    }

    // ─── Chat display helpers ───
    function addMsg(text, role) {
      removeInterim();
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function showInterim(text) {
      if (!interimDiv) {
        interimDiv = document.createElement('div');
        interimDiv.className = 'msg interim';
        chat.appendChild(interimDiv);
      }
      interimDiv.textContent = text;
      chat.scrollTop = chat.scrollHeight;
    }

    function removeInterim() {
      if (interimDiv) { interimDiv.remove(); interimDiv = null; }
    }

    function clearChat() {
      chat.innerHTML = '';
      interimDiv = null;
    }

    // ─── Session history ───
    async function loadSessions() {
      try {
        const res = await fetch('/api/sessions');
        const data = await res.json();
        renderSessions(data.sessions);
      } catch (err) {
        console.error('Failed to load sessions:', err);
      }
    }

    function renderSessions(sessions) {
      sessionList.innerHTML = '';
      for (const s of sessions) {
        const item = document.createElement('div');
        item.className = 'session-item' + (s.session_id === currentSessionId ? ' active' : '');
        item.dataset.sessionId = s.session_id;

        const title = document.createElement('span');
        title.className = 'session-title';
        title.textContent = s.title || 'New chat';
        item.appendChild(title);

        const del = document.createElement('span');
        del.className = 'session-delete';
        del.textContent = '✕';
        del.onclick = (e) => { e.stopPropagation(); deleteSession(s.session_id); };
        item.appendChild(del);

        item.onclick = () => viewSession(s.session_id);
        sessionList.appendChild(item);
      }
    }

    function highlightSession(sessionId) {
      document.querySelectorAll('.session-item').forEach(el => {
        el.classList.toggle('active', el.dataset.sessionId === sessionId);
      });
    }

    async function viewSession(sessionId) {
      // If it's the current live session, just highlight it
      if (sessionId === currentSessionId && !viewingHistory) {
        highlightSession(sessionId);
        return;
      }

      // Switch to history viewing mode
      viewingHistory = true;

      // Turn off mic/PTT if active
      if (micActive) await toggleMic();
      if (pttRecording) await togglePTT();
      btn.disabled = true;
      pttBtn.disabled = true;
      status.textContent = '📖 Viewing past conversation';

      // Close active WebSocket (we'll reconnect on "New Chat")
      if (ws) { ws.onclose = null; ws.close(); }

      clearChat();
      highlightSession(sessionId);

      try {
        const res = await fetch(`/api/sessions/${sessionId}/messages`);
        const data = await res.json();
        if (data.messages.length === 0) {
          chat.innerHTML = '<div class="history-label">No messages in this session</div>';
        } else {
          for (const msg of data.messages) {
            addMsg(msg.content, msg.role);
          }
        }
      } catch (err) {
        chat.innerHTML = '<div class="history-label">Failed to load messages</div>';
      }
    }

    async function deleteSession(sessionId) {
      try {
        await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
        // If we deleted the session we're viewing, start a new chat
        if (sessionId === currentSessionId || viewingHistory) {
          startNewChat();
        }
        loadSessions();
      } catch (err) {
        console.error('Failed to delete session:', err);
      }
    }

    function startNewChat() {
      viewingHistory = false;
      pttRecording = false;
      micActive = false;
      clearChat();
      stopPlayback();
      stopAudioCapture();
      btn.disabled = false;
      btn.classList.remove('active');
      btn.innerHTML = '🎤<span class="mic-label">Stream</span>';
      pttBtn.disabled = false;
      pttBtn.classList.remove('recording');
      pttBtn.innerHTML = '🎙️<span class="mic-label">PTT</span>';
      status.textContent = 'Connecting...';
      currentSessionId = null;

      // Close old WebSocket and reconnect (server will create a new session)
      if (ws) { ws.onclose = null; ws.close(); }
      connect();
    }

    // ─── Submit conversation ───
    const submitBtn = document.getElementById('submitBtn');
    const toastEl = document.getElementById('toast');

    function showToast(message, type = 'success') {
      toastEl.textContent = message;
      toastEl.className = `toast show ${type}`;
      setTimeout(() => { toastEl.className = 'toast'; }, 3000);
    }

    async function submitSession() {
      const sid = currentSessionId;
      if (!sid) { showToast('No active session to submit', 'error'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = '⏳';

      try {
        const res = await fetch(`/api/sessions/${sid}/submit`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          submitBtn.classList.add('submitted');
          submitBtn.textContent = '✅';
          showToast('Conversation submitted to analytics!', 'success');
        } else {
          submitBtn.textContent = '📤';
          showToast('Error: ' + (data.error || 'Unknown error'), 'error');
        }
      } catch (err) {
        submitBtn.textContent = '📤';
        showToast('Failed to submit: ' + err.message, 'error');
      }

      setTimeout(() => {
        submitBtn.disabled = false;
        submitBtn.classList.remove('submitted');
        submitBtn.textContent = '📤';
      }, 3000);
    }

    // ─── Init ───
    connect();
    loadSessions();
  </script>
</body>
</html>
